
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz Esame Venatorio Alto Adige</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Arial;margin:0;background:#f4f6f7}
header{background:#1e6f3d;color:white;padding:16px;text-align:center;font-size:22px}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:white;border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 3px 8px rgba(0,0,0,.08)}
button{padding:12px;border:none;border-radius:8px;background:#1e6f3d;color:white;font-size:16px;margin-top:8px;width:100%}
.answer{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;margin-top:10px;cursor:pointer}
.correct{background:#a9dfbf}
.wrong{background:#f5b7b1}
.menu button{margin-bottom:10px}
.stats{font-size:14px;margin-top:10px}
.timer{font-weight:bold;color:#c0392b}
</style>
</head>
<body>

<header>Quiz Esame Venatorio</header>

<div class="container">

<div id="menu" class="card menu">
<h3>Modalità</h3>
<button onclick="startTraining()">Allenamento</button>
<button onclick="startExam()">Simulazione Esame (50 domande)</button>
<button onclick="showStats()">Statistiche</button>
</div>

<div id="quiz" class="card" style="display:none"></div>

</div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
